<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Open LokaLinc</title>

<script>
(function () {
  var path = window.location.pathname;
  var search = window.location.search;

  var isResetPassword = path.startsWith("/reset-password");

  var isSharedPost =
    path.startsWith("/sublet/") ||
    path.startsWith("/travel/") ||
    path.startsWith("/community/");

  if (!isResetPassword && !isSharedPost) {
    return;
  }

  var fullPath = path.replace(/^\//, "") + search;
  var appLink = "lokalinc://" + fullPath;

  var appStoreUrl = "https://apps.apple.com/app/lokalinc/id6761270364";
  var playStoreUrl = "https://play.google.com/store/apps/details?id=com.lokalinc.parth";

  var isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
  var isAndroid = /Android/i.test(navigator.userAgent);
  var appOpened = false;

  function openApp() {
    window.location.href = appLink;
  }

  document.addEventListener("visibilitychange", function () {
    if (document.hidden) {
      appOpened = true;
    }
  });

  window.openLokaLincApp = openApp;

  setTimeout(openApp, 300);

  setTimeout(function () {
    if (appOpened) return;

    /*
      IMPORTANT:
      For reset-password, do NOT redirect to App Store / Play Store.
      This protects your reset-password flow.
    */
    if (isResetPassword) {
      return;
    }

    /*
      For shared posts only:
      If app is not installed, send user to store.
    */
    if (isIOS) {
      window.location.href = appStoreUrl;
    } else if (isAndroid) {
      window.location.href = playStoreUrl;
    }
  }, 1800);
})();
</script>

<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  padding: 40px 20px;
  background: #f8fafc;
  color: #1f2937;
}

.logo {
  width: 90px;
  margin-bottom: 16px;
}

h1 {
  color: #10b981;
}

.btn {
  display: inline-block;
  margin: 10px;
  padding: 12px 20px;
  background: #10b981;
  color: white;
  text-decoration: none;
  border-radius: 8px;
  font-weight: 600;
}

.store img {
  height: 48px;
  margin: 8px;
}
</style>
</head>

<body>

<img src="/Logo_LokaLinc_Transparent.png" class="logo" alt="LokaLinc logo">

<h1>LokaLinc</h1>

<p>
  We are trying to open this link in the LokaLinc app.
</p>

<a class="btn" href="#" onclick="openLokaLincApp(); return false;">
  Open App
</a>

<br><br>

<p>If the app is not installed, download it here:</p>

<div class="store">
  <a href="https://apps.apple.com/app/lokalinc/id6761270364">
    <img src="https://developer.apple.com/assets/elements/badges/download-on-the-app-store.svg" alt="Download on the App Store">
  </a>

  <a href="https://play.google.com/store/apps/details?id=com.lokalinc.parth">
    <img src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg" alt="Get it on Google Play">
  </a>
</div>

<br>

<a class="btn" href="https://lokalinc.de">
  Visit Website
</a>

</body>
</html>
