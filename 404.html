<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>LokaLinc</title>

<script>
(function () {

  var path = window.location.pathname;

  // Check if it is a deep link
  if (
    path.startsWith("/sublet/") ||
    path.startsWith("/travel/") ||
    path.startsWith("/community/") ||
    path.startsWith("/reset-password")
  ) {

    // Try to open app (Android example)
    var fullPath = window.location.pathname.replace(/^\//, '') + window.location.search;
    var appLink = "lokalinc://" + fullPath;
    
    var isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
    var isAndroid = /Android/i.test(navigator.userAgent);
    var appOpened = false;
    
    // Method 1: iframe (silent attempt)
    var iframe = document.createElement("iframe");
    iframe.style.display = "none";
    iframe.src = appLink;
    document.body.appendChild(iframe);
    
    // Method 2: try direct redirect shortly after
    setTimeout(function () {
      window.location.href = appLink;
    }, 100);
    
    // Detect if app opened
    document.addEventListener("visibilitychange", function () {
      if (document.hidden) {
        appOpened = true;
      }
    });
    
    // Fallback
    setTimeout(function () {
      if (!appOpened) {
        if (isIOS) {
          window.location.href = "https://lokalinc.de/privacy"; //YOUR_APP_STORE_URL
        } else if (isAndroid) {
          window.location.href = "https://lokalinc.de/imprint"; //YOUR_PLAY_STORE_URL
        }
      }
    }, 1500);

  }

})();
</script>

<style>
body{
  font-family:Arial, sans-serif;
  text-align:center;
  padding:40px;
}
.btn{
  display:inline-block;
  margin:10px;
  padding:12px 20px;
  background:#10b981;
  color:white;
  text-decoration:none;
  border-radius:6px;
}
</style>

</head>

<body>

<h1>Welcome to LokaLinc</h1>

<p>It looks like the page you’re trying to access isn’t available here.</p>

<br>

<a class="btn" href="https://lokalinc.de">Visit Website</a>

<br><br>

<p>For the best experience, please install and open LokaLinc on your device.</p>
<p>You can find the download information on the main page.</p>

</body>

</html>
