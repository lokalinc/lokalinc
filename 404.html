<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>LokaLinc</title>

<script>
(function () {

  var path = window.location.pathname;

  if (
    path.startsWith("/sublet/") ||
    path.startsWith("/travel/") ||
    path.startsWith("/community/")
  ) {

    var appLink = "lokalinc://" + path;
    var clickedAt = Date.now();
    var hasOpened = false;

    // Detect if browser goes to background (app opened)
    document.addEventListener("visibilitychange", function () {
      if (document.hidden) {
        hasOpened = true;
      }
    });

    // Try opening app
    window.location.href = appLink;

    // Fallback logic
    setTimeout(function () {
      var elapsed = Date.now() - clickedAt;

      // If app did NOT open
      if (!hasOpened && elapsed < 3000) {
        document.getElementById("fallback").style.display = "block";
      }
    }, 1500);

  }

})();
</script>

<style>
body{
  font-family:Arial, sans-serif;
  text-align:center;
  padding:40px;
}
.btn{
  display:inline-block;
  margin:10px;
  padding:12px 20px;
  background:#10b981;
  color:white;
  text-decoration:none;
  border-radius:6px;
}
#fallback{
  display:none;
}
</style>

</head>

<body>

<div id="fallback">

<h2>Open in LokaLinc</h2>

<p>This content is available in the LokaLinc app.</p>
<p>Install the app to view it.</p>

<br>

<!-- Replace these links later -->
<a class="btn" href="lokalinc://">Open in App</a>
<a class="btn" href="#">Download for Android</a>
<a class="btn" href="#">Download for iOS</a>

</div>

</body>
</html>
